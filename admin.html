<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Poddoians Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="bg-glow"></div>

    <!-- Password Protection Overlay -->
    <div id="login-overlay" style="position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2rem;">
        <div class="logo-icon" style="width: 64px; height: 64px; font-size: 2rem;">
            <i class="fas fa-lock"></i>
        </div>
        <div class="glass-panel" style="width: 100%; max-width: 320px; text-align: center;">
            <h2 style="margin-bottom: 1.5rem;">Admin Access</h2>
            <div class="form-group">
                <input type="password" id="admin-password" placeholder="Enter Password" style="text-align: center;">
            </div>
            <button id="login-btn" class="btn-primary" style="width: 100%; justify-content: center;">Unlock Dashboard</button>
            <p id="login-error" style="color: var(--error); font-size: 0.8rem; margin-top: 1rem; display: none;">Incorrect password. Try again.</p>
        </div>
        <a href="index.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Return to Portal</a>
    </div>

    <div id="app" style="display: none;">
        <header class="glass-panel animate-in">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="logo-text">
                    <h1 id="group-name-display">Seven Poddoians</h1>
                    <p>Admin Dashboard</p>
                </div>
            </div>
            <div class="stats-container">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-info">
                        <span id="member-count">0</span>
                        <label>Students</label>
                    </div>
                </div>
                <div class="stat-card warning">
                    <i class="fas fa-user-slash"></i>
                    <div class="stat-info">
                        <span id="ban-count">0</span>
                        <label>Restricted</label>
                    </div>
                </div>
            </div>
        </header>

        <nav class="glass-panel animate-in" style="animation-delay: 0.1s">
            <button class="nav-btn active" data-tab="members">
                <i class="fas fa-user-group"></i> <span>Directory</span>
            </button>
            <button class="nav-btn" data-tab="bans">
                <i class="fas fa-gavel"></i> <span>Registry</span>
            </button>
            <button class="nav-btn" data-tab="rules">
                <i class="fas fa-book-open"></i> <span>Rules</span>
            </button>
            <button class="nav-btn" data-tab="comments">
                <i class="fas fa-comments"></i> <span>Comments</span>
            </button>
            <button class="nav-btn" data-tab="feedback">
                <i class="fas fa-comment-dots"></i> <span>Feedback</span>
            </button>
            <button class="nav-btn" data-tab="settings">
                <i class="fas fa-cog"></i> <span>Settings</span>
            </button>
        </nav>

        <main class="animate-in" style="animation-delay: 0.2s">
            <!-- Members Section -->
            <section id="members-tab" class="tab-content active">
                <div class="action-bar">
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-member" placeholder="Search members...">
                    </div>
                    <button id="add-member-btn" class="btn-primary"><i class="fas fa-plus"></i> Add Member</button>
                </div>
                <div class="table-container">
                    <table id="members-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Strikes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="member-list-body">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Ban List Section -->
            <section id="bans-tab" class="tab-content">
                <div class="table-container">
                    <table id="bans-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Reason / Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ban-list-body">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Rules Section -->
            <section id="rules-tab" class="tab-content">
                <div class="rules-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 id="rules-title">📜 Class Group Rules</h2>
                    </div>
                    <ul class="rules-list" id="rules-list-container">
                        <!-- Dynamic Rules -->
                    </ul>
                </div>
            </section>

            <!-- Comments Section -->
            <section id="comments-tab" class="tab-content">
                <div class="action-bar" style="margin-bottom: 1.5rem; justify-content: space-between; align-items: center;">
                    <h3><i class="fas fa-comments"></i> Comment Moderation</h3>
                </div>
                <div id="admin-comments-list" class="feedback-container">
                    <!-- Admin comments populated by JS -->
                </div>
            </section>

            <!-- Feedback Section -->
            <section id="feedback-tab" class="tab-content">
                <div class="action-bar" style="margin-bottom: 1.5rem; justify-content: space-between; align-items: center;">
                    <h3><i class="fas fa-comments"></i> Community Feedback</h3>
                </div>
                <div id="feedback-list" class="feedback-container">
                    <!-- Feedback items populated by JS -->
                </div>
            </section>

            <!-- Settings Section -->
            <section id="settings-tab" class="tab-content">
                <div class="glass-panel">
                    <h3><i class="fas fa-pen-nib"></i> Group Identity</h3>
                    <div class="form-group" style="margin-top: 1rem;">
                        <label>WhatsApp Group Name</label>
                        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                            <input type="text" id="edit-group-name" placeholder="Enter group name...">
                            <button id="save-group-name" class="btn-primary">Update</button>
                        </div>
                        <label>Site Author Name</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="edit-author-name" placeholder="Enter author name...">
                            <button id="save-author-name" class="btn-primary">Update</button>
                        </div>
                    </div>
                </div>

                <div class="glass-panel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3><i class="fas fa-list-check"></i> Manage Rules</h3>
                        <button id="add-rule-btn" class="btn-primary" style="padding: 0.5rem 1rem;"><i class="fas fa-plus"></i> Add Rule</button>
                    </div>
                    <div id="rules-editor-container">
                        <!-- Rules editor items -->
                    </div>
                </div>
            </section>
        </main>

        <footer style="text-align: center; padding: 2rem; opacity: 0.5; font-size: 0.8rem;">
            <a href="index.html" style="color: var(--text-dim); text-decoration: none;">&larr; Back to User Portal</a>
        </footer>

        <!-- Modals -->
        <div id="member-modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title">Add Member</h2>
                <form id="member-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label for="member-name">Full Name</label>
                        <input type="text" id="member-name" required placeholder="Enter classmate's name">
                    </div>
                    <div class="modal-actions" style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem;">
                        <button type="button" id="close-modal" class="btn-icon" style="width: auto; padding: 0 1rem;">Cancel</button>
                        <button type="submit" class="btn-primary">Save Member</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "sortablejs": "https://esm.sh/sortablejs@1.15.2"
      }
    }
    </script>
    <script type="module" src="admin.js"></script>
</body>
</html>
